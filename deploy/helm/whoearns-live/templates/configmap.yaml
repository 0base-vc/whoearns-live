apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "whoearns.fullname" . }}-config
  labels:
    {{- include "whoearns.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  HTTP_PORT: {{ .Values.config.httpPort | quote }}
  HTTP_HOST: {{ .Values.config.httpHost | quote }}
  SITE_URL: {{ .Values.config.siteUrl | default "http://localhost:8080" | quote }}
  SITE_NAME: {{ .Values.config.siteName | default "WhoEarns" | quote }}
  METRICS_PORT: {{ .Values.config.metricsPort | default 0 | quote }}
  WORKER_METRICS_PORT: {{ .Values.config.workerMetricsPort | default 0 | quote }}
  API_RATE_LIMIT_MAX: {{ .Values.config.apiRateLimitMax | default 60 | quote }}
  API_RATE_LIMIT_WINDOW_MS: {{ .Values.config.apiRateLimitWindowMs | default 60000 | quote }}
  TRUST_PROXY_HOPS: {{ .Values.config.trustProxyHops | default 0 | quote }}
  SOLANA_RPC_URL: {{ .Values.config.solanaRpcUrl | quote }}
  SOLANA_RPC_TIMEOUT_MS: {{ .Values.config.solanaRpcTimeoutMs | quote }}
  SOLANA_RPC_CONCURRENCY: {{ .Values.config.solanaRpcConcurrency | quote }}
  SOLANA_RPC_MAX_RETRIES: {{ .Values.config.solanaRpcMaxRetries | quote }}
  SOLANA_RPC_CREDITS_PER_SEC: {{ .Values.config.solanaRpcCreditsPerSec | default 0 | quote }}
  SOLANA_RPC_BURST_CREDITS: {{ .Values.config.solanaRpcBurstCredits | default 0 | quote }}
  {{- if .Values.config.solanaFallbackRpcUrl }}
  SOLANA_FALLBACK_RPC_URL: {{ .Values.config.solanaFallbackRpcUrl | quote }}
  {{- end }}
  {{- if .Values.config.solanaArchiveRpcUrl }}
  SOLANA_ARCHIVE_RPC_URL: {{ .Values.config.solanaArchiveRpcUrl | quote }}
  {{- end }}
  {{- if .Values.config.yellowstoneGrpcUrl }}
  YELLOWSTONE_GRPC_URL: {{ .Values.config.yellowstoneGrpcUrl | quote }}
  {{- end }}
  {{- if .Values.config.yellowstoneGrpcXToken }}
  YELLOWSTONE_GRPC_X_TOKEN: {{ .Values.config.yellowstoneGrpcXToken | quote }}
  {{- end }}
  VALIDATORS_WATCH_LIST: {{ .Values.config.validatorsWatchList | quote }}
  EPOCH_WATCH_INTERVAL_MS: {{ .Values.config.epochWatchIntervalMs | quote }}
  SLOT_INGEST_INTERVAL_MS: {{ .Values.config.slotIngestIntervalMs | quote }}
  FEE_INGEST_INTERVAL_MS: {{ .Values.config.feeIngestIntervalMs | quote }}
  FEE_INGEST_BATCH_SIZE: {{ .Values.config.feeIngestBatchSize | quote }}
  AGGREGATES_INTERVAL_MS: {{ .Values.config.aggregatesIntervalMs | quote }}
  CLOSED_EPOCH_RECONCILE_INTERVAL_MS: {{ .Values.config.closedEpochReconcileIntervalMs | quote }}
  # Phase 2 — gossip + validator-info refresh cadences.
  CLUSTER_NODES_INTERVAL_MS: {{ .Values.config.clusterNodesIntervalMs | default 1800000 | quote }}
  VALIDATOR_INFO_INTERVAL_MS: {{ .Values.config.validatorInfoIntervalMs | default 21600000 | quote }}
  VALIDATOR_INFO_BULK_INTERVAL_MS: {{ .Values.config.validatorInfoBulkIntervalMs | default 21600000 | quote }}
  # Phase 4 — wallet daily-activity indexer cadence.
  WALLET_ACTIVITY_INTERVAL_MS: {{ .Values.config.walletActivityIntervalMs | default 21600000 | quote }}
  # Phase 4-extension — wallet fee backfill cadence + per-tick
  # `getTransactionFee` budget. Job is only registered when
  # `SOLANA_ARCHIVE_RPC_URL` is set; otherwise these are inert.
  WALLET_FEE_BACKFILL_INTERVAL_MS: {{ .Values.config.walletFeeBackfillIntervalMs | default 3600000 | quote }}
  WALLET_FEE_BACKFILL_PER_TICK_LIMIT: {{ .Values.config.walletFeeBackfillPerTickLimit | default 500 | quote }}
  # Phase 2-extension — validators.app canonical client-kind ingester cadence.
  VALIDATORS_APP_INTERVAL_MS: {{ .Values.config.validatorsAppIntervalMs | default 21600000 | quote }}
  # Phase 5 — SIMD curation cadence. Anthropic API key itself is
  # injected via Secret reference in the StatefulSet (never via
  # ConfigMap). The interval drives the worker scheduler; the
  # public read endpoint is unaffected by this value.
  SIMD_CURATION_INTERVAL_MS: {{ .Values.config.simdCurationIntervalMs | default 43200000 | quote }}
  # Tier-snapshot ingester cadence (migration 0045). Forward-only
  # per-closed-epoch tier composite snapshots for the profile
  # movement + history surfaces. Cheap cursor check on most ticks.
  TIER_SNAPSHOT_INTERVAL_MS: {{ .Values.config.tierSnapshotIntervalMs | default 1800000 | quote }}
  # Phase 5 — Anthropic model identifier. Non-secret; goes in ConfigMap.
  ANTHROPIC_MODEL: {{ .Values.anthropic.model | default "claude-sonnet-4-6" | quote }}
  SLOT_FINALITY_BUFFER: {{ .Values.config.slotFinalityBuffer | quote }}
  SHUTDOWN_TIMEOUT_MS: {{ .Values.config.shutdownTimeoutMs | quote }}
