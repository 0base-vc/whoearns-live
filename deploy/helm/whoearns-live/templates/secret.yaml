{{- /*
  Managed Secret holding the Anthropic API key.

  Created ONLY when `anthropic.apiKey` is non-empty AND
  `anthropic.existingSecret` is empty — i.e. the user opted into the
  inline (dev / fork) pattern. In the externally-managed pattern the
  caller pre-creates a Secret with `ANTHROPIC_API_KEY` and the
  StatefulSet references it via `anthropic.existingSecret`; this
  template is then skipped.

  Both branches converge on the same env-var name + key inside the
  Secret (`ANTHROPIC_API_KEY`) so the StatefulSet's secretKeyRef
  doesn't have to fork on which pattern was selected.
*/}}
{{- if and .Values.anthropic.apiKey (not .Values.anthropic.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "whoearns.fullname" . }}-anthropic
  labels:
    {{- include "whoearns.labels" . | nindent 4 }}
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ .Values.anthropic.apiKey | b64enc | quote }}
{{- end -}}
